<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI — Melee Analysis through Generative Intelligence</title>
<meta name="description" content="AI-powered Melee coaching from your Slippi replays. The first tool that actually watches you play.">
<meta name="theme-color" content="#050805">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --slippi:#21BA45;
  --phosphor:#1de84a;
  --dim:rgba(33,186,69,0.4);
  --ghost:rgba(33,186,69,0.15);
  --faint:rgba(33,186,69,0.07);
  --screen:#050805;
  --bezel:#1a1a1c;
  --bezel-hi:#2a2a2e;
  --room:#030303;
}
html,body{margin:0;height:100%;background:var(--room);overflow:hidden}
body{
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',Courier,monospace;
  padding:12px;
}

/* ═══ KEYFRAMES ═══ */
@keyframes crt-on{
0%{opacity:0;transform:scaleY(.005) scaleX(.3);filter:brightness(30)}
20%{opacity:1;transform:scaleY(.005) scaleX(1);filter:brightness(10)}
40%{transform:scaleY(1.1) scaleX(1);filter:brightness(2)}
60%{transform:scaleY(.95);filter:brightness(1.2)}
80%{transform:scaleY(1.02);filter:brightness(1)}
100%{transform:scaleY(1);filter:brightness(1);opacity:1}
}
@keyframes scan-move{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}
@keyframes flicker{
0%,100%{opacity:1}92%{opacity:1}93%{opacity:.82}94%{opacity:1}
}
@keyframes glow-pulse{
0%,100%{box-shadow:0 0 60px rgba(33,186,69,.06),0 0 120px rgba(33,186,69,.03),inset 0 0 60px rgba(33,186,69,.04)}
50%{box-shadow:0 0 80px rgba(33,186,69,.1),0 0 160px rgba(33,186,69,.05),inset 0 0 80px rgba(33,186,69,.06)}
}
@keyframes blink{50%{opacity:0}}
@keyframes led-pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ═══ MONITOR SHELL ═══ */
.monitor{
width:100%;max-width:720px;
background:linear-gradient(170deg,var(–bezel-hi) 0%,var(–bezel) 30%,#111113 100%);
border-radius:18px;padding:18px 18px 24px;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03);
}
.monitor-brand{
text-align:center;font-family:‘Helvetica Neue’,Helvetica,Arial,sans-serif;
font-size:10px;font-weight:700;letter-spacing:.35em;text-transform:uppercase;
color:rgba(255,255,255,.08);margin-bottom:10px;user-select:none;
}

/* ═══ SCREEN ═══ */
.screen{
background:var(–screen);border-radius:6px;overflow:hidden;
position:relative;border:1px solid var(–faint);
}
.screen.on{animation:glow-pulse 4s ease-in-out infinite}

/* CRT power-on wrapper */
.crt-wrap{
opacity:0;transform-origin:center center;
}
.crt-wrap.powered{animation:crt-on .6s cubic-bezier(.23,1,.32,1) forwards}

/* Scanlines */
.scanlines{
position:absolute;inset:0;z-index:10;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);
}
/* Moving scan beam */
.scan-beam{position:absolute;inset:0;z-index:11;pointer-events:none;overflow:hidden}
.scan-beam::after{
content:’’;display:block;width:100%;height:8px;
background:linear-gradient(180deg,transparent,rgba(33,186,69,.07),transparent);
animation:scan-move 4s linear infinite;
}
/* Flicker */
.flicker{animation:flicker 8s linear infinite}

/* ═══ TAB BAR ═══ */
.tabs{
display:flex;border-bottom:1px solid rgba(33,186,69,.1);
background:rgba(33,186,69,.02);position:relative;z-index:5;
overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
flex:0 0 auto;padding:10px 16px;background:transparent;
border:none;border-bottom:2px solid transparent;
color:var(–dim);font-family:inherit;font-size:10px;font-weight:700;
letter-spacing:.2em;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab:hover{color:rgba(33,186,69,.6)}
.tab.active{
background:rgba(33,186,69,.08);border-bottom-color:var(–slippi);
color:var(–phosphor);text-shadow:0 0 8px var(–slippi);
}
.tab.disabled{color:rgba(33,186,69,.15);cursor:default}
.tab.disabled:hover{color:rgba(33,186,69,.15)}
.tab-status{
margin-left:auto;padding:10px 16px;font-size:9px;
letter-spacing:.15em;color:var(–dim);display:flex;
align-items:center;gap:12px;white-space:nowrap;
}
.status-dot{
width:5px;height:5px;border-radius:50%;
background:rgba(33,186,69,.3);display:inline-block;
margin-right:4px;vertical-align:middle;
}
.status-dot.live{background:var(–phosphor);box-shadow:0 0 6px var(–slippi)}

/* ═══ CONTENT AREA ═══ */
.content{
height:clamp(300px,52vh,520px);
overflow-y:auto;overflow-x:hidden;
padding:24px 20px;font-size:12px;line-height:1.8;
scrollbar-width:thin;scrollbar-color:var(–dim) transparent;
white-space:pre-wrap;word-break:break-word;
}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(–dim);border-radius:2px}

/* Text styles */
.t-title{color:var(–phosphor);font-size:16px;font-weight:700;text-shadow:0 0 10px var(–slippi),0 0 30px var(–ghost);letter-spacing:.15em}
.t-sub{color:var(–dim);font-size:12px;letter-spacing:.05em}
.t-normal{color:rgba(33,186,69,.7)}
.t-success{color:var(–phosphor);font-weight:600;text-shadow:0 0 8px var(–slippi)}
.t-dim{color:var(–dim);font-size:11px}
.t-body{color:rgba(33,186,69,.75)}

/* Cursor */
.cursor{
display:inline-block;width:8px;height:15px;
background:var(–phosphor);box-shadow:0 0 6px var(–slippi);
animation:blink 1s step-end infinite;vertical-align:text-bottom;
}

/* ═══ BOTTOM STATUS BAR ═══ */
.status-bar{
display:flex;justify-content:space-between;align-items:center;
padding:8px 16px;border-top:1px solid rgba(33,186,69,.08);
font-size:9px;letter-spacing:.1em;
color:rgba(33,186,69,.25);position:relative;z-index:5;
flex-wrap:wrap;gap:4px 16px;
}

/* ═══ MONITOR CHIN ═══ */
.chin{
display:flex;align-items:center;justify-content:space-between;
padding:14px 8px 0;
}
.power-led{
width:7px;height:7px;border-radius:50%;
background:rgba(255,255,255,.05);
transition:all .5s;
}
.power-led.on{
background:var(–slippi);
box-shadow:0 0 8px var(–slippi),0 0 16px var(–ghost);
animation:led-pulse 3s ease-in-out infinite;
}
.chin-label{
font-family:‘Helvetica Neue’,Helvetica,Arial,sans-serif;
font-size:8px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;
color:rgba(255,255,255,.06);user-select:none;
}
.chin-center{
font-family:‘Helvetica Neue’,Helvetica,Arial,sans-serif;
font-size:11px;font-weight:900;letter-spacing:.25em;
color:rgba(255,255,255,.04);text-transform:uppercase;user-select:none;
}

/* ═══ LINKS INSIDE CONTENT ═══ */
.content a{
color:var(–phosphor);text-decoration:none;
text-shadow:0 0 6px var(–ghost);
border-bottom:1px solid rgba(33,186,69,.2);
transition:all .2s;
}
.content a:hover{
border-bottom-color:var(–phosphor);
text-shadow:0 0 10px var(–slippi);
}

/* ═══ DOM REFS ═══ */
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const screen = $("#screen");
const crtWrap = $("#crtWrap");
const content = $("#content");
const statusDot = $("#statusDot");
const statusText = $("#statusText");
const clockEl = $("#clock");
const powerLed = $("#powerLed");

let booted = false;
let activeTab = "boot";
let typewriterRAF = null;

/* ═══ CLOCK ═══ */
function tickClock() {
  const d = new Date();
  const t = d.toLocaleTimeString("en-US", { hour12: false });
  const ms = String(d.getMilliseconds()).padStart(3, "0").slice(0, 2);
  clockEl.textContent = t + "." + ms;
}
tickClock();
setInterval(tickClock, 47);

/* ═══ POWER ON ═══ */
setTimeout(() => {
  crtWrap.classList.add("powered");
  screen.classList.add("on");
  powerLed.classList.add("on");
  runBoot();
}, 400);

/* ═══ BOOT SEQUENCE ═══ */
function runBoot() {
  content.innerHTML = "";
  const timers = [];
  BOOT_LINES.forEach((line, i) => {
    timers.push(setTimeout(() => {
      const div = document.createElement("div");
      div.className = line.cls;
      div.textContent = line.text || "\u00A0";
      content.appendChild(div);
      content.scrollTop = content.scrollHeight;

      if (i === BOOT_LINES.length - 1) {
        const cur = document.createElement("span");
        cur.className = "cursor";
        content.appendChild(cur);
        setTimeout(finishBoot, 800);
      }
    }, line.delay));
  });
}

function finishBoot() {
  booted = true;
  statusDot.classList.add("live");
  statusText.textContent = "LIVE";
  $$(".tab.disabled").forEach((t) => {
    t.classList.remove("disabled");
  });
}

/* ═══ TAB SWITCHING ═══ */
$$("#tabs .tab").forEach((btn) => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    if (tab === "boot" || (!booted && tab !== "boot")) return;
    if (tab === activeTab) return;

    activeTab = tab;
    $$(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");

    if (typewriterRAF) cancelAnimationFrame(typewriterRAF);
    content.innerHTML = "";

    typewritePanel(PANELS[tab]);
  });
});

/* ═══ TYPEWRITER ENGINE ═══ */
function typewritePanel(raw) {
  content.innerHTML = "";

  /* Parse {{url|label}} link syntax into segments */
  const segments = [];
  let remaining = raw;
  const linkRe = /\{\{([^|]+)\|([^}]+)\}\}/;
  while (true) {
    const m = remaining.match(linkRe);
    if (!m) { segments.push({ type: "text", value: remaining }); break; }
    const before = remaining.slice(0, m.index);
    if (before) segments.push({ type: "text", value: before });
    segments.push({ type: "link", url: m[1], label: m[2] });
    remaining = remaining.slice(m.index + m[0].length);
  }

  /* Build flat char array with metadata */
  const chars = [];
  segments.forEach((seg) => {
    if (seg.type === "text") {
      for (const ch of seg.value) chars.push({ ch, link: null });
    } else {
      for (const ch of seg.label) chars.push({ ch, link: seg.url });
    }
  });

  const span = document.createElement("span");
  span.className = "t-body";
  content.appendChild(span);

  const cursor = document.createElement("span");
  cursor.className = "cursor";
  content.appendChild(cursor);

  let idx = 0;
  let currentLink = null;
  let currentAnchor = null;
  const speed = 3;
  let lastTime = 0;

  function step(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const elapsed = timestamp - lastTime;
    const target = Math.min(Math.floor(elapsed / speed), chars.length);

    while (idx < target) {
      const c = chars[idx];
      if (c.link && c.link !== currentLink) {
        currentLink = c.link;
        currentAnchor = document.createElement("a");
        currentAnchor.href = c.link;
        currentAnchor.target = "_blank";
        currentAnchor.rel = "noopener";
        span.appendChild(currentAnchor);
      } else if (!c.link && currentLink) {
        currentLink = null;
        currentAnchor = null;
      }

      const textNode = document.createTextNode(c.ch);
      if (currentAnchor) {
        currentAnchor.appendChild(textNode);
      } else {
        span.appendChild(textNode);
      }
      idx++;
    }

    content.scrollTop = content.scrollHeight;

    if (idx < chars.length) {
      typewriterRAF = requestAnimationFrame(step);
    } else {
      cursor.remove();
    }
  }
  typewriterRAF = requestAnimationFrame(step);
}
</script>
