name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create key.env
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > key.env

      - name: Create build.env (HMAC secret for proxy signing)
        run: echo "MAGI_HMAC_SECRET=${{ secrets.MAGI_HMAC_SECRET }}" > build.env

      - name: Compile main process
        run: npx tsc -p tsconfig.main.json

      - name: Build renderer
        run: npx vite build

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magi-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          generate_release_notes: false
          body: |
            ## MAGI ${{ github.ref_name }}

            AI-powered Melee coaching from your Slippi replays.

            ### Downloads
            - **Windows:** `.exe` installer
            - **macOS:** `.dmg` disk image
            - **Linux:** `.AppImage` (make executable with `chmod +x`)

            ### Getting Started
            1. Open the app
            2. Go to Settings — enter your tag, browse to your replay folder
            3. Click Import All
            4. Go to Coaching tab and click any game for AI analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
